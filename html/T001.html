<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ハムストリングスストレッチ</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f3f4f6;
      font-family: "Yu Gothic", "Meiryo", sans-serif;
      color: #111827;
    }

    .card {
      max-width: 760px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 22px;
      padding: 26px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    }

    .title {
      font-size: 34px;
      font-weight: 900;
      margin: 0 0 18px;
      line-height: 1.25;
      border-bottom: 4px solid #1f5d8f;
      padding-bottom: 16px;
    }

    .gif-box {
      text-align: center;
      margin: 22px 0 28px;
    }

    .gif-box img {
      max-width: 100%;
      width: 520px;
      border-radius: 12px;
      display: block;
      margin: 0 auto;
    }

    .section {
      margin: 24px 0;
    }

    .label {
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .text {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.75;
      padding-left: 18px;
    }

    .count {
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      background: #f9fafb;
      border: 2px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      margin-top: 8px;
    }

    .id {
      text-align: right;
      color: #9ca3af;
      font-size: 13px;
      margin-top: 20px;
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
      }

      .card {
        padding: 18px;
        border-radius: 18px;
      }

      .title {
        font-size: 26px;
      }

      .label {
        font-size: 22px;
      }

      .text {
        font-size: 18px;
      }

      .count {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <div class="card">

    <h1 class="title">ハムストリングスストレッチ</h1>

    <div class="gif-box">
      <img src="../gif/T001.gif" alt="ハムストリングスストレッチ">
    </div>

    <div class="section">
      <div class="label">【目的】</div>
      <div class="text">ハムストリングス柔軟性改善</div>
    </div>

    <div class="section">
      <div class="label">【注意点】</div>
      <div class="text">①骨盤後傾させすぎない</div>
    </div>

    <div class="section">
      <div class="label">【回数】</div>
      <div class="count">30秒 × 5set</div>
    </div>

    <div class="id">T001</div>

  </div>
</body>
</html>
